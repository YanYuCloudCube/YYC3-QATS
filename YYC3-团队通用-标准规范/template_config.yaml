# 文档追溯配置
traceability:
  enabled: true
  auto_checksum: true
  version_control: true
  change_log: true
  related_docs_tracking: true

# 迭代配置
iteration:
  auto_increment_version: true
  preserve_history: true
  max_history_versions: 10
