# YYC³ 文档模版配置
# Document Template Configuration for YYC³ Project

version: "3.0.0"
created: "2026-03-27"
description: "YYC³可复用文档模版配置体系"

# 全局变量配置
global_variables:
  brand_name: "YanYuCloudCube"
  brand_slogan_cn: "言启象限 | 语枢未来"
  brand_slogan_en: "Words Initiate Quadrants, Language Serves as Core for Future"
  brand_vision_cn: "万象归元于云枢 | 深栈智启新纪元"
  brand_vision_en: "All things converge in cloud pivot; Deep stacks ignite a new era of intelligence"
  contact_email: "admin@0379.email"
  default_author: "YanYuCloudCube Team"
  default_version: "v3.0.0"

# 验证规则配置
validation_rules:
  require_brand_header: true
  require_brand_footer: true
  require_metadata: true
  require_core_philosophy: true
  min_length: 500
  max_length: 100000

# 模版定义
templates:
  # 主文档模版
  main_document:
    name: "主文档模版"
    version: "v3.0.0"
    type: "main"
    variables:
      doc_title: ""
      doc_description: ""
      doc_category: ""
      doc_section: ""
    content: |
      ---
      @file: {{file_name}}
      @description: {{doc_description}}
      @author: {{author}}
      @version: {{version}}
      @created: {{created_date}}
      @updated: {{updated_date}}
      @status: {{status}}
      @tags: {{tags}}
      @checksum: {{checksum}}
      @trace_id: {{trace_id}}
      ---
      
      > ***YanYuCloudCube***
      > *言启象限 | 语枢未来*
      > ***Words Initiate Quadrants, Language Serves as Core for Future***
      > *万象归元于云枢 | 深栈智启新纪元*
      > ***All things converge in cloud pivot; Deep stacks ignite a new era of intelligence***
      
      ---
      
      # {{doc_title}}
      
      ## 核心理念
      
      **五高架构**：高可用 | 高性能 | 高安全 | 高扩展 | 高智能
      **五标体系**：标准化 | 规范化 | 自动化 | 可视化 | 智能化
      **五化转型**：流程化 | 数字化 | 生态化 | 工具化 | 服务化
      **五维评估**：时间维 | 空间维 | 属性维 | 事件维 | 关联维
      
      ---
      
      ## 文档概述
      
      {{doc_description}}
      
      ---
      
      ## 详细内容
      
      {{content}}
      
      ---
      
      ## 文档追溯信息
      
      | 属性 | 值 |
      |------|-----|
      | 文档版本 | {{version}} |
      | 创建日期 | {{created_date}} |
      | 更新日期 | {{updated_date}} |
      | 内容校验 | {{checksum}} |
      | 追溯ID | {{trace_id}} |
      | 关联文档 | {{related_docs}} |
      
      ---
      
      <div align="center">
      
      > 「***YanYuCloudCube***」
      > 「***<admin@0379.email>***」
      > 「***Words Initiate Quadrants, Language Serves as Core for the Future***」
      > 「***All things converge in cloud pivot; Deep stacks ignite a new era of intelligence***」
      
      **© 2025-2026 YYC³ Team. All Rights Reserved.**
      </div>

  # README文档模版
  readme_document:
    name: "README索引模版"
    version: "v3.0.0"
    type: "readme"
    variables:
      dir_name: ""
      dir_description: ""
    content: |
      ---
      @file: README.md
      @description: {{dir_name}} 目录文档索引
      @author: YanYuCloudCube Team
      @version: v3.0.0
      @created: {{created_date}}
      @updated: {{updated_date}}
      @status: published
      @tags: [文档索引],[README]
      ---
      
      > ***YanYuCloudCube***
      > *言启象限 | 语枢未来*
      > ***Words Initiate Quadrants, Language Serves as Core for Future***
      > *万象归元于云枢 | 深栈智启新纪元*
      > ***All things converge in cloud pivot; Deep stacks ignite a new era of intelligence***
      
      ---
      
      # {{dir_name}}
      
      ## 核心理念
      
      **五高架构**：高可用 | 高性能 | 高安全 | 高扩展 | 高智能
      **五标体系**：标准化 | 规范化 | 自动化 | 可视化 | 智能化
      **五化转型**：流程化 | 数字化 | 生态化 | 工具化 | 服务化
      **五维评估**：时间维 | 空间维 | 属性维 | 事件维 | 关联维
      
      ---
      
      ## 目录概述
      
      {{dir_description}}
      
      ---
      
      ## 文档索引
      
      | 序号 | 文档名称 | 描述 | 标签 |
      |------|----------|------|------|
      {{doc_table}}
      
      ---
      
      ## 文档规范
      
      - **命名规范**：`{编号}-{阶段}-{模块}-{文档名称}.md`
      - **版本规范**：主版本.次版本.修订版本 (如 v3.0.0)
      - **标签规范**：使用方括号包裹，如 `[标签1],[标签2]`
      
      ---
      
      <div align="center">
      
      > 「***YanYuCloudCube***」
      > 「***<admin@0379.email>***」
      > 「***Words Initiate Quadrants, Language Serves as Core for the Future***」
      > 「***All things converge in cloud pivot; Deep stacks ignite a new era of intelligence***」
      
      **© 2025-2026 YYC³ Team. All Rights Reserved.**
      </div>

